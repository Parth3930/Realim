<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background with subtle gradient -->
  <rect width="512" height="512" rx="128" fill="url(#bg-gradient)"/>
  
  <!-- Network Nodes / Peers -->
  <circle cx="150" cy="180" r="32" fill="#F5C842" stroke="#0A0A0A" stroke-width="12"/>
  <circle cx="360" cy="150" r="40" fill="#E8553A" stroke="#0A0A0A" stroke-width="12"/>
  <circle cx="256" cy="360" r="48" fill="#a855f7" stroke="#0A0A0A" stroke-width="12"/>

  <!-- Connections / Strokes -->
  <path d="M176 195 L220 320" stroke="#0A0A0A" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M340 180 L290 325" stroke="#0A0A0A" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M182 170 Q 256 120 320 145" stroke="#0A0A0A" stroke-width="16" stroke-linecap="round" stroke-dasharray="24 16"/>

  <!-- Pencil / Drawing Icon Overlaying -->
  <g transform="translate(140, 20) rotate(45)">
    <!-- Pencil Body -->
    <path d="M150 150 L250 150 L250 350 L150 350 Z" fill="#2ed573" stroke="#0A0A0A" stroke-width="12"/>
    <!-- Pencil Tip -->
    <path d="M150 350 L200 430 L250 350 Z" fill="#F5EDDA" stroke="#0A0A0A" stroke-width="12"/>
    <path d="M180 400 L200 430 L220 400 Z" fill="#0A0A0A"/>
    <!-- Pencil Eraser -->
    <path d="M150 120 L250 120 L250 150 L150 150 Z" fill="#E8553A" stroke="#0A0A0A" stroke-width="12"/>
  </g>

  <!-- Defs for Gradients -->
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5EDDA"/>
      <stop offset="1" stop-color="#E2D4B7"/>
    </linearGradient>
  </defs>
</svg>
